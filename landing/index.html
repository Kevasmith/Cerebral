<script>
const API = 'https://cerebral-production.up.railway.app/api/v1';

// Blur-text animation on headline
(function () {
  document.querySelectorAll('[data-blur-text]').forEach(el => {
    let counter = { i: 0 };
    const wrapTextNode = (textNode, parent) => {
      textNode.nodeValue.split(/(\s+)/).forEach(part => {
        if (!part) return;
        if (/^\s+$/.test(part)) {
          parent.appendChild(document.createTextNode(part));
        } else {
          const span = document.createElement('span');
          span.className = 'bt-word bt-anim';
          span.style.transitionDelay = (counter.i++ * 80) + 'ms';
          span.textContent = part;
          parent.appendChild(span);
        }
      });
    };
    const walk = (source, dest) => {
      Array.from(source.childNodes).forEach(node => {
        if (node.nodeType === Node.TEXT_NODE) {
          wrapTextNode(node, dest);
        } else if (node.nodeType === Node.ELEMENT_NODE) {
          if (node.tagName === 'BR') {
            dest.appendChild(document.createElement('br'));
          } else {
            const clone = node.cloneNode(false);
            walk(node, clone);
            dest.appendChild(clone);
          }
        }
      });
    };
    const frag = document.createDocumentFragment();
    walk(el, frag);
    el.innerHTML = '';
    el.appendChild(frag);
  });

  requestAnimationFrame(() => {
    setTimeout(() => {
      document.querySelectorAll('.bt-anim').forEach(el => el.classList.add('in'));
      document.querySelectorAll('.fade-up').forEach(el => {
        const d = parseInt(el.dataset.fadeDelay || '0', 10);
        setTimeout(() => el.classList.add('in'), d);
      });
    }, 60);
  });
})();

// Waitlist submit
async function joinWaitlist(e) {
  e.preventDefault();
  const form   = e.target;
  const email  = form.querySelector('input[type=email]').value;
  const btn    = form.querySelector('button');
  const status = document.getElementById('wl-status');

  btn.disabled    = true;
  btn.textContent = 'Joining...';

  try {
    const res = await fetch(`${API}/waitlist`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email }),
    });
    if (!res.ok && res.status !== 409) throw new Error('server error');
    posthog.capture('waitlist_joined', { email, source: 'landing_page' });
    if (status) status.textContent = `You're in! We'll email ${email} when your spot opens.`;
    btn.textContent = '✓ On the list';
    btn.style.opacity = '0.7';
  } catch {
    posthog.capture('waitlist_joined', { email, source: 'landing_page', fallback: true });
    if (status) status.textContent = `You're in! We'll be in touch at ${email}.`;
    btn.textContent = '✓ On the list';
    btn.style.opacity = '0.7';
  }
  return false;
}
</script>
