<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: #080E14;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .orb {
    position: fixed;
    width: 700px;
    height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(16,200,150,0.18) 0%, transparent 70%);

    left: 50%;

    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 24px 80px;
    text-align: center;
  }

  .logo {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    margin-bottom: 48px;
    opacity: 0.95;
  }

  h1 {
    font-size: clamp(2.6rem, 6.5vw, 4.8rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1.06;
    max-width: 680px;
    margin-bottom: 24px;
  }

  h1 em {
    font-style: normal;
    color: #10C896;
  }

  .sub {
    font-size: clamp(1rem, 2vw, 1.15rem);
    color: rgba(255,255,255,0.55);
    max-width: 500px;
    line-height: 1.7;
    margin-bottom: 44px;
  }

  .waitlist {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    padding: 8px 8px 8px 16px;
    width: 100%;
    max-width: 440px;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
  }

  .waitlist input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: #fff;
    font-size: 15px;
    min-width: 0;
  }

  .waitlist input::placeholder { color: rgba(255,255,255,0.3); }

  .waitlist button {
    background: linear-gradient(135deg, #0a9165, #10C896);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 11px 22px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.01em;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
    flex-shrink: 0;
  }

  .waitlist button:hover { opacity: 0.85; }
  .waitlist button:disabled { opacity: 0.6; cursor: default; }

  .status {
    margin-top: 16px;
    font-size: 13px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.02em;
  }

  .footer {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.2);
    z-index: 10;
    white-space: nowrap;
  }

  .footer a {
    color: inherit;
    text-decoration: none;
    transition: color 0.15s;
  }

<div class="orb"></div>

<div class="page">
  <img src="logo-mark.png" alt="Cerebral" class="logo" />

  <h1>Your money.<br>Finally <em>understood.</em></h1>

  <p class="sub">Cerebral connects to your accounts and turns the chaos into one clear story — what you're spending, what you're missing, and what to do next. Built for the next generation of Canadians.</p>

  <form class="waitlist" onsubmit="return joinWaitlist(event)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>
    <input type="email" required placeholder="you@gmail.com">
    <button type="submit">Join the waitlist →</button>
  </form>
  <div class="status" id="wl-status">Free during beta · No credit card · Cancel anytime</div>
</div>

<div class="footer">
  <a href="privacy.html">Privacy</a>
  <a href="terms.html">Terms</a>
  <a href="mailto:hello@contact.cerebralwealth.app">Contact</a>
</div>

<script>
const API = 'https://cerebral-production.up.railway.app/api/v1';

async function joinWaitlist(e) {
  e.preventDefault();
  const form   = e.target;
  const email  = form.querySelector('input[type=email]').value;
  const btn    = form.querySelector('button');
  const status = document.getElementById('wl-status');

  btn.disabled    = true;
  btn.textContent = 'Joining...';

  try {
    const res = await fetch(`${API}/waitlist`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email }),
    });
    if (!res.ok && res.status !== 409) throw new Error('server error');
    posthog.capture('waitlist_joined', { email, source: 'landing_page' });
    if (status) status.textContent = `You're in! We'll email ${email} when your spot opens.`;
    btn.textContent = '✓ On the list';
    btn.style.opacity = '0.7';
  } catch {
    posthog.capture('waitlist_joined', { email, source: 'landing_page', fallback: true });
    if (status) status.textContent = `You're in! We'll be in touch at ${email}.`;
    btn.textContent = '✓ On the list';
    btn.style.opacity = '0.7';
  }
  return false;
}
</script>
